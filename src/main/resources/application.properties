spring.application.name=clase
server.port=8081

eureka.client.enabled=true

spring.datasource.url=jdbc:mysql://localhost:3306/db_gimnasio
spring.datasource.username=root
spring.datasource.password=

spring.flyway.enabled=true
spring.flyway.repair=true
spring.flyway.repair-on-migrate=true
spring.flyway.table=flyway_schema_clase
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

entrenador-service.url=http://localhost:8082/api/entrenador
horario-service.url=http://localhost:8083/api/horario

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

springdoc.api-docs.enabled=true 
springdoc.swagger-ui.enabled=true 
springdoc.swagger-ui.path=/doc/swagger-ui.html
server.forward-headers-strategy=framework

